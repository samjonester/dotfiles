# =============================================================================
# tmux.conf — pi-optimized, restored from dotfiles history + new additions
# =============================================================================

# ---------------------------------------------------------------------------
# Terminal / colors
# ---------------------------------------------------------------------------
set -g default-terminal "xterm-256color"
set -g default-command /bin/zsh
set -g default-shell /bin/zsh
set -ga terminal-overrides ",xterm-256color:Tc"

# ---------------------------------------------------------------------------
# Pi-critical: Extended keys + passthrough
# ---------------------------------------------------------------------------
# Without this, Shift+Enter and Ctrl+Enter collapse to plain Enter in tmux.
# csi-u format is recommended by pi docs for reliable modifier key forwarding.
set -g extended-keys always
set -g extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'
set -g allow-passthrough on
set -ga update-environment "KITTY_WINDOW_ID KITTY_PID TERM_PROGRAM"
set -g focus-events on

# ---------------------------------------------------------------------------
# Prefix: C-Space (your long-standing preference)
# ---------------------------------------------------------------------------
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ---------------------------------------------------------------------------
# General behavior
# ---------------------------------------------------------------------------
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 500000
set -g escape-time 0            # No delay after Escape (critical for pi/vim)
set -g display-time 2000
set -g status-interval 5
set -g set-titles on
set -g set-titles-string "#S"

# ---------------------------------------------------------------------------
# Splits — preserve working directory
# ---------------------------------------------------------------------------
unbind '"'
unbind %
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ---------------------------------------------------------------------------
# Smart pane switching — vim-tmux-navigator aware
# ---------------------------------------------------------------------------
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" "send-keys C-h"  "select-pane -L"
bind-key -n 'C-j' if-shell "$is_vim" "send-keys C-j"  "select-pane -D"
bind-key -n 'C-k' if-shell "$is_vim" "send-keys C-k"  "select-pane -U"
bind-key -n 'C-l' if-shell "$is_vim" "send-keys C-l"  "select-pane -R"
bind-key -n 'C-\' if-shell "$is_vim" "send-keys C-\\" "select-pane -l"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# Remap clear-screen to prefix + ctrl + l (since C-l is taken by navigator)
bind C-l send-keys 'C-l'

# Resize panes (useful for adjusting lead/teammate column widths)
bind-key -r H resize-pane -L 15
bind-key -r J resize-pane -D 15
bind-key -r K resize-pane -U 15
bind-key -r L resize-pane -R 15

# ---------------------------------------------------------------------------
# Copy mode — vi keys
# ---------------------------------------------------------------------------
setw -g mode-keys vi
bind Enter copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "pbcopy"
bind-key -T copy-mode-vi Escape send -X cancel

# ---------------------------------------------------------------------------
# Session management
# ---------------------------------------------------------------------------
bind S command-prompt -p "new session:" "new-session -s '%%'"
bind s choose-tree -sZ
bind X confirm-before -p "kill-session #S? (y/n)" kill-session

# ---------------------------------------------------------------------------
# Agent Teams — pane awareness
# ---------------------------------------------------------------------------
# Show pane titles in borders (agent-teams sets these via setPaneTitle)
set -g pane-border-status top
set -g pane-border-format " #{pane_title} "
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour208"

# Quick zoom toggle to focus on one agent pane
bind z resize-pane -Z

# ---------------------------------------------------------------------------
# Status bar
# ---------------------------------------------------------------------------
set -g status-position bottom
set -g status-style "bg=colour235,fg=colour248"

set -g status-left-length 30
set -g status-left "#[fg=colour208,bold] #S #[fg=colour238]│ "

set -g status-right-length 50
set -g status-right "#[fg=colour238]│ #[fg=colour248]#h #[fg=colour238]│ #[fg=colour248]%H:%M "

set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=colour208,bold] #I:#W "
set -g window-status-separator ""

# ---------------------------------------------------------------------------
# Workspace launcher (runs in kitty overlay)
# ---------------------------------------------------------------------------
bind f display-popup -E -w 80% -h 60% '~/dotfiles/bin/workspace'

# ---------------------------------------------------------------------------
# Quality of life
# ---------------------------------------------------------------------------
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"
